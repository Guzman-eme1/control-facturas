<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación C. Imberton</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; padding: 20px; text-align: center; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { width: 70%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; margin-bottom: 10px; }
        button { padding: 12px 20px; border-radius: 8px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        .barra-bg { background: #333; border-radius: 20px; height: 25px; margin: 20px 0; }
        #progreso { background: #00c853; width: 0%; height: 100%; border-radius: 20px; transition: 0.5s; }
        #reader { width: 100%; max-width: 350px; margin: 15px auto; border-radius: 10px; overflow: hidden; }
        .lista { text-align: left; margin-top: 20px; }
        .item-fac { padding: 8px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
        .recibido { color: #00c853; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Control de Recepción</h2>
        <input type="text" id="inputBusqueda" placeholder="Emb. o Factura">
        <button onclick="consultar()">Cargar</button>

        <div class="barra-bg"><div id="progreso"></div></div>
        <p id="stats">Esperando datos...</p>

        <div id="reader"></div>
        <div id="listaFacturas" class="lista"></div>
    </div>

    <script>
        const URL_API = "https://script.google.com/macros/s/AKfycbzPlVT8KfZ393_DZHbQj3SelAXPk_gfGZslYmYNUHAAW52ZHiW-i_agsi0qAX-9-p5-VA/exec";
        let datosLocales = [];

        async function consultar() {
            let q = document.getElementById("inputBusqueda").value;
            if(!q) return;
            const res = await fetch(URL_API + "?q=" + q);
            datosLocales = await res.json();
            dibujarLista();
            iniciarEscaneo();
        }

        function iniciarEscaneo() {
            const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
            scanner.render((codigo) => {
                let limpio = codigo.replace(/\D/g, "");
                enviarValidacion(limpio);
            });
        }

        async function enviarValidacion(fac) {
            const res = await fetch(URL_API, {
                method: "POST",
                body: JSON.stringify({ factura: fac })
            });
            alert("Procesando factura: " + fac);
            consultar(); // Recarga para ver el cambio
        }

        function dibujarLista() {
            let html = "";
            let validadas = 0;
            datosLocales.forEach(f => {
                let clase = f.estado === "RECIBIDO" ? "recibido" : "";
                if(f.estado === "RECIBIDO") validadas++;
                html += `<div class="item-fac"><span>FAC: ${f.factura}</span> <span class="${clase}">${f.estado || 'PENDIENTE'}</span></div>`;
            });
            document.getElementById("listaFacturas").innerHTML = html;
            let porc = (validadas / datosLocales.length) * 100 || 0;
            document.getElementById("progreso").style.width = porc + "%";
            document.getElementById("stats").innerText = `Progreso: ${validadas} / ${datosLocales.length}`;
        }
    </script>
</body>
</html>
