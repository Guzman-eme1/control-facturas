<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación Logística</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; padding: 15px; text-align: center; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        input, textarea { width: 90%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #252525; color: white; margin-bottom: 10px; }
        button { padding: 12px 20px; border-radius: 8px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px;}
        .btn-camera { background: #6c757d; margin-bottom: 15px; }
        .barra-bg { background: #333; border-radius: 20px; height: 15px; margin: 15px 0; }
        #progreso { background: #00c853; width: 0%; height: 100%; border-radius: 20px; transition: 0.5s; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; background: #000; margin-bottom: 10px; }
        .item-fac { padding: 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; font-size: 0.9em; }
        .recibido { color: #00c853; font-weight: bold; }
        /* Modal de confirmación */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #252525; padding: 20px; border-radius: 15px; width: 85%; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Recepción C. Imberton</h3>
        <input type="text" id="inputBusqueda" placeholder="Embarque o Factura">
        <button onclick="consultar()">1. CARGAR DATOS</button>

        <div class="barra-bg"><div id="progreso"></div></div>
        
        <button id="btnCam" class="btn-camera" onclick="controlCamara()">📷 ABRIR CÁMARA</button>
        <div id="reader"></div>

        <div id="listaFacturas"></div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h4 id="modalTitulo">Validar Factura</h4>
            <textarea id="obs" placeholder="Observaciones (Ej: Devolución, daño...)"></textarea>
            <button style="background: #28a745;" onclick="confirmarEnvio()">CONFIRMAR RECIBIDO</button>
            <button style="background: #dc3545;" onclick="cerrarModal()">CANCELAR</button>
        </div>
    </div>

    <script>
        const URL_API = "https://script.google.com/macros/s/AKfycbxz0mNXsq25q_SqQi2DNRq-fHFZUuZooQn6lbHTUK3Tp3GgCXxUyYBhxtyR8umQaqk2lA/exec";
        let html5QrCode;
        let facturaPendiente = "";

        async function consultar() {
            let q = document.getElementById("inputBusqueda").value;
            if(!q) return;
            document.getElementById("listaFacturas").innerHTML = "Cargando...";
            const res = await fetch(URL_API + "?q=" + q);
            const datos = await res.json();
            dibujarLista(datos);
        }

        function controlCamara() {
            const btn = document.getElementById("btnCam");
            if (!html5QrCode || !html5QrCode.isScanning) {
                html5QrCode = new Html5Qrcode("reader");
                html5QrCode.start(
                    { facingMode: "environment" }, // Solo cámara trasera
                    { fps: 10, qrbox: 250 },
                    (codigo) => {
                        facturaPendiente = codigo.replace(/\D/g, "");
                        abrirModal();
                    }
                );
                btn.innerText = "❌ CERRAR CÁMARA";
                btn.style.background = "#dc3545";
            } else {
                html5QrCode.stop().then(() => {
                    btn.innerText = "📷 ABRIR CÁMARA";
                    btn.style.background = "#6c757d";
                });
            }
        }

        function abrirModal() {
            document.getElementById("modalTitulo").innerText = "Factura: " + facturaPendiente;
            document.getElementById("modal").style.display = "flex";
        }

        function cerrarModal() {
            document.getElementById("modal").style.display = "none";
            document.getElementById("obs").value = "";
        }

        async function confirmarEnvio() {
            let observacion = document.getElementById("obs").value;
            document.getElementById("modal").innerHTML = "Enviando...";
            
            await fetch(URL_API, {
                method: "POST",
                body: JSON.stringify({ factura: facturaPendiente, obs: observacion })
            });
            
            location.reload(); // Recarga para limpiar y actualizar
        }

        function dibujarLista(datos) {
            let html = "";
            let validadas = 0;
            datos.forEach(f => {
                let clase = f.estado === "RECIBIDO" ? "recibido" : "";
                if(f.estado === "RECIBIDO") validadas++;
                html += `<div class="item-fac"><span>FAC: ${f.factura}</span> <span class="${clase}">${f.estado || 'PENDIENTE'}</span></div>`;
            });
            document.getElementById("listaFacturas").innerHTML = html;
            let porc = (validadas / datos.length) * 100 || 0;
            document.getElementById("progreso").style.width = porc + "%";
        }
    </script>
</body>
</html>
